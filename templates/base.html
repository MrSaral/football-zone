<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Football Zone{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>Football Zone</h1>
            <p class="subtitle">Real-time Football Insights & AI Analysis</p>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Football Zone by Saral Uttamani. Powered by Football-Data.org and Gemini AI.</p>
        </div>
    </footer>
</body>
</html>
